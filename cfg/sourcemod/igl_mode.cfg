// =============================================================================
// IGL Mode Configuration
// =============================================================================
// This file is auto-generated by SourceMod and will be executed on map load.
// Place in: csgo/cfg/sourcemod/igl_mode.cfg
// =============================================================================

// Enable/disable IGL Mode (0 = disabled, 1 = enabled)
// Default: 1
igl_enabled "1"

// Maximum number of bots per squad (1-4)
// Default: 4
igl_squad_size "4"

// Enable debug logging (0 = disabled, 1 = enabled)
// Default: 0
igl_debug "0"

// Automatically assign bots to players on round start (0 = disabled, 1 = enabled)
// Default: 1
igl_auto_assign "1"

// Cooldown between orders in seconds (0.0-10.0)
// Default: 1.0
igl_order_cooldown "1.0"

// =============================================================================
// Bot Settings (CS:GO server convars)
// These enhance bot behavior for IGL Mode
// =============================================================================

// Disable bot auto-difficulty adjustment
bot_difficulty "2"

// Allow bots to be controlled
bot_allow_rogues "0"

// Don't let bots buy on their own
// bot_auto_buy "0"

// Prevent bots from talking
bot_chatter "off"

// =============================================================================
// Recommended Server Settings
// =============================================================================

// Longer round times for tactical play
// mp_roundtime "3"
// mp_roundtime_defuse "2.25"

// Enable friendly fire for realism (optional)
// mp_friendlyfire "1"

// Disable auto team balance
// mp_autoteambalance "0"
// mp_limitteams "0"
